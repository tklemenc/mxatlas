name: Rebuild Germany site assets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.13
      - run: uv sync
      - name: Rebuild data.json from committed Germany CSV
        run: |
          if [ -f kommunen_mail_provider_classification.csv ]; then
            uv run build-data-de --input kommunen_mail_provider_classification.csv --output data.json
          else
            echo "kommunen_mail_provider_classification.csv not committed; skipping rebuild."
          fi
      - name: Commit and push if changed
        run: |
          git diff --quiet data.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: rebuild Germany site data"
          git push
